name: Despliegue automatico a DigitalOcean

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse al servidor y actualizar
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/MiPortafolio
          git pull origin main
          npm install
          npm run build
          pm2 restart portafolio
